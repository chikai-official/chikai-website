<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563EB">
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hibi">
<title>Hibi｜日々 — タスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#2563EB;--blue-d:#1E40AF;--blue-l:#EFF6FF;--cyan:#06B6D4;
  --cta:#F97316;--cta-d:#EA580C;
  --text:#0D1B2A;--text2:#475569;--text3:#94A3B8;
  --bg:#F4F7FB;--card:#FFFFFF;--border:#E6EBF2;--done:#9CA3AF;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;
  max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:128px;}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;font-family:'Space Grotesk';}
.brand h1{font-size:19px;font-weight:900;letter-spacing:-.5px;}
.brand h1 small{display:block;font-size:10px;color:var(--text3);font-weight:500;letter-spacing:2px;}
.bell{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 11px;font-size:15px;cursor:pointer;color:var(--text2);}
.bell.on{background:var(--blue-l);border-color:#BFDBFE;color:var(--blue);}
.notice{margin:12px 16px 0;background:#FFF7ED;border:1px solid #FED7AA;color:#9A3412;border-radius:12px;
  padding:11px 14px;font-size:12.5px;display:none;align-items:center;justify-content:space-between;gap:10px;}
.notice button{background:var(--cta);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.view{padding:18px 16px 0;}.view.hidden{display:none;}
.day-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:10px;}
.day-title{font-size:22px;font-weight:900;letter-spacing:-.5px;}.day-title span{color:var(--blue);}
.day-sub{font-size:12px;color:var(--text3);font-weight:600;}
.count{font-size:12px;color:var(--text3);margin:10px 2px 14px;font-weight:600;}
.tasks{display:flex;flex-direction:column;gap:10px;}
.task{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:13px;
  box-shadow:0 2px 10px rgba(13,27,42,.04);transition:transform .12s;border-left:5px solid var(--border);}
.task:active{transform:scale(.99);}
.task .time{min-width:54px;text-align:center;}
.task .time b{display:block;font-family:'Space Grotesk';font-size:17px;font-weight:700;color:var(--blue);line-height:1.1;}
.task .time small{font-size:10px;color:var(--text3);}
.task .tick{width:26px;height:26px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;margin-top:1px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;}
.task .tick.done{background:var(--blue);border-color:var(--blue);}
.task .body{flex:1;min-width:0;cursor:pointer;}
.task .ttl{font-size:15.5px;font-weight:700;word-break:break-word;}
.task .memo{font-size:12.5px;color:var(--text2);margin-top:3px;white-space:pre-wrap;word-break:break-word;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;}
.task .memo.expanded{-webkit-line-clamp:unset;}
.task .badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center;}
.badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:100px;background:var(--blue-l);color:var(--blue-d);}
.badge.notify{background:#FFF7ED;color:#C2410C;}
.badge.rep{background:#F1F5F9;color:#475569;}
.badge.due{background:#EEF2FF;color:#3730A3;}
.badge.due.soon{background:#FFF7ED;color:#C2410C;}
.badge.due.overdue{background:#FEF2F2;color:#B91C1C;}
.due-toggle{border:1px solid var(--border);background:#fff;border-radius:11px;padding:12px 16px;font-family:inherit;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;width:100%;text-align:left;}
.due-toggle.on{background:#EEF2FF;border-color:#C7D2FE;color:#3730A3;}
.cat-dot{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:100px;color:#fff;}
.task.is-done .ttl{text-decoration:line-through;color:var(--done);}
.task.is-done .time b{color:var(--done);}
.task.is-done{opacity:.5;padding-top:9px;padding-bottom:9px;}
.task.is-done .memo,.task.is-done .badges{display:none;}
.del{border:none;background:transparent;color:var(--text3);font-size:17px;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.empty{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px;}.empty .ic{font-size:40px;margin-bottom:10px;}
/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-title{font-size:20px;font-weight:900;}
.nav-day{display:flex;align-items:center;gap:8px;}
.nav-day button{border:1px solid var(--border);background:#fff;border-radius:9px;width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--text2);}
.nav-day .today-btn{width:auto;padding:0 12px;font-size:12px;font-weight:700;color:var(--blue);height:36px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-wd{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0;}
.cal-wd.sun{color:#DC2626;}.cal-wd.sat{color:#2563EB;}
.cal-cell{aspect-ratio:1/1.05;border:1px solid var(--border);border-radius:11px;background:#fff;padding:5px 0 0;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;}
.cal-cell.blank{border:none;background:transparent;cursor:default;}
.cal-cell .d{font-size:13px;font-weight:700;color:var(--text2);font-family:'Space Grotesk';}
.cal-cell.today{background:var(--blue-l);border-color:#BFDBFE;}.cal-cell.today .d{color:var(--blue);}
.cal-cell.sel{outline:2px solid var(--blue);outline-offset:-1px;}
.cal-dots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center;max-width:90%;}
.cal-dots i{width:6px;height:6px;border-radius:50%;display:block;}
.cal-more{font-size:8px;color:var(--text3);}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:var(--text2);}
.cal-legend span{display:flex;align-items:center;gap:5px;}.cal-legend i{width:9px;height:9px;border-radius:50%;}
.cal-detail{margin-top:20px;border-top:1px solid var(--border);padding-top:16px;}
.cal-detail-head{font-size:16px;font-weight:900;}.cal-detail-head span{color:var(--blue);}
/* FAB + nav */
.fab{position:fixed;bottom:90px;right:calc(50% - 240px + 18px);z-index:40;width:60px;height:60px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--cta),var(--cta-d));color:#fff;font-size:30px;cursor:pointer;box-shadow:0 10px 28px rgba(249,115,22,.45);display:flex;align-items:center;justify-content:center;}
@media(max-width:480px){.fab{right:18px;}}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:35;
  background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;}
.bottomnav button{flex:1;border:none;background:transparent;padding:12px 0 18px;font-family:inherit;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bottomnav button .ic{font-size:21px;}.bottomnav button.active{color:var(--blue);}
/* sheet */
.overlay{position:fixed;inset:0;background:rgba(13,27,42,.45);z-index:50;opacity:0;pointer-events:none;transition:.2s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;max-width:480px;z-index:51;background:#fff;border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));transition:transform .26s cubic-bezier(.2,.8,.2,1);box-shadow:0 -10px 40px rgba(0,0,0,.18);max-height:92vh;overflow-y:auto;}
.sheet.show{transform:translateX(-50%) translateY(0);}
.sheet h2{font-size:17px;font-weight:900;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.title-row{display:flex;gap:8px;}.title-row input{flex:1;}
input[type=text],input[type=date],input[type=time],select,.sheet textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:13px 14px;font-family:inherit;font-size:15px;color:var(--text);background:#fff;}
.sheet textarea{min-height:74px;line-height:1.7;font-size:14.5px;resize:vertical;}
input:focus,select:focus,.sheet textarea:focus{outline:none;border-color:var(--blue);}
.mic{width:50px;border:1px solid var(--border);background:#fff;border-radius:12px;font-size:20px;cursor:pointer;flex-shrink:0;}
.mic.recording{background:#FEE2E2;border-color:#FCA5A5;animation:pulse 1s infinite;}
@keyframes pulse{50%{background:#FECACA;}}
.nl-hint{font-size:11.5px;color:var(--blue);margin-top:7px;min-height:16px;font-weight:600;}
.row2{display:flex;gap:10px;}.row2 .field{flex:1;}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chips button{border:1px solid var(--border);background:#fff;border-radius:100px;padding:8px 14px;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--text2);cursor:pointer;}
.chips button.sel{color:#fff;border-color:transparent;}
.notify-opts{display:flex;gap:8px;}
.notify-opts button{flex:1;border:1px solid var(--border);background:#fff;border-radius:11px;padding:11px 4px;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--text2);cursor:pointer;}
.notify-opts button.sel{background:var(--blue);border-color:var(--blue);color:#fff;}
.sheet-actions{display:flex;gap:10px;margin-top:8px;}
.btn{flex:1;border:none;border-radius:13px;padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;}
.btn-primary{background:linear-gradient(135deg,var(--cta),var(--cta-d));color:#fff;box-shadow:0 6px 20px rgba(249,115,22,.35);}
.btn-ghost{background:#F1F5F9;color:var(--text2);flex:0 0 90px;}
.hint{font-size:11px;color:var(--text3);margin-top:10px;text-align:center;line-height:1.5;}
</style>
</head>
<body>

<header>
  <div class="brand"><div class="mark">日</div><h1>Hibi<small>TASK MANAGER</small></h1></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="bell" id="installBtn" title="ホーム画面に追加" style="display:none;font-size:13px;font-weight:700;">📲 追加</button>
    <button class="bell" id="bellBtn" title="通知を有効化">🔔</button>
  </div>
</header>

<div class="notice" id="notice">
  <span>通知（5・15・30分前）を使うには許可が必要です。</span>
  <button id="enableNotif">通知を許可</button>
</div>

<!-- HOME -->
<section class="view" id="view-home">
  <div class="day-head"><div><div class="day-title" id="homeDate">今日</div><div class="day-sub">ホーム ｜ 今日のタスク（時系列）</div></div></div>
  <div class="count" id="homeCount"></div>
  <div class="tasks" id="homeTasks"></div>
</section>

<!-- CALENDAR -->
<section class="view hidden" id="view-cal">
  <div class="cal-head">
    <div class="nav-day"><button id="calPrev">‹</button></div>
    <div class="cal-title" id="calTitle">—</div>
    <div class="nav-day"><button id="calToday" class="today-btn">今月</button><button id="calNext">›</button></div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-legend" id="calLegend"></div>
  <div class="cal-detail">
    <div class="cal-detail-head" id="calDetailDate">—</div>
    <div class="count" id="calDetailCount"></div>
    <div class="tasks" id="calDetailTasks"></div>
  </div>
</section>

<button class="fab" id="fab">＋</button>

<nav class="bottomnav">
  <button id="tab-home" class="active"><span class="ic">🏠</span>ホーム</button>
  <button id="tab-cal"><span class="ic">🗓️</span>カレンダー</button>
</nav>

<!-- SHEET -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <h2 id="sheetTitle">タスクを追加</h2>
  <div class="field">
    <label>やること（「明日15時に会議」と話す/書くと日時を自動入力）</label>
    <div class="title-row"><input type="text" id="fTitle" placeholder="例：明日15時に歯医者"><button class="mic" id="micBtn" title="音声入力">🎤</button></div>
    <div class="nl-hint" id="nlHint"></div>
  </div>
  <div class="field"><label>内容（メモ・任意）</label><textarea id="fMemo" placeholder="詳細・持ち物・場所・URLなど"></textarea></div>
  <div class="row2">
    <div class="field"><label>日付</label><input type="date" id="fDate"></div>
    <div class="field"><label>時間</label><input type="time" id="fTime"></div>
  </div>
  <div class="field"><label>カテゴリ</label><div class="chips" id="catChips"></div></div>
  <div class="field"><label>通知</label><div class="notify-opts" id="notifyOpts">
    <button data-n="none" class="sel">なし</button><button data-n="5">5分前</button><button data-n="15">15分前</button><button data-n="30">30分前</button>
  </div></div>
  <div class="field"><label>繰り返し</label>
    <select id="fRepeat"><option value="none">なし</option><option value="daily">毎日</option><option value="weekly">毎週</option><option value="monthly">毎月</option></select>
  </div>
  <div class="field"><label>期限（○日までに完了）</label>
    <button type="button" class="due-toggle" id="dueToggle">📌 期限を付ける</button>
    <input type="date" id="fDue" style="display:none;margin-top:8px;">
  </div>
  <div class="sheet-actions"><button class="btn btn-ghost" id="sheetCancel">閉じる</button><button class="btn btn-primary" id="sheetSave">保存</button></div>
  <div class="hint" id="micHint">🎤＝Android/PC Chromeの音声入力。iPhoneは入力欄→キーボードの🎤（音声入力）が確実です。通知はアプリを開いている間に届きます。</div>
</div>

<script>
/* ===== カテゴリ（仕事1・仕事2・プライベートの3つ）===== */
const CATS={ work1:{label:'仕事1',color:'#2563EB'}, work2:{label:'仕事2',color:'#7C3AED'}, life:{label:'プライベート',color:'#F97316'} };

/* ===== 状態・保存 ===== */
const LS_TASKS='hibi_tasks_v3';
let tasks=load(LS_TASKS,[]);
function load(k,def){ try{return JSON.parse(localStorage.getItem(k))??def;}catch(e){return def;} }
function saveTasks(){ localStorage.setItem(LS_TASKS,JSON.stringify(tasks)); }

/* ===== 日付ヘルパ ===== */
const WD=['日','月','火','水','木','金','土'];
const todayStr=()=>fmt(new Date());
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function jp(ds){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(y,m-1,d); return `${m}月${d}日(${WD[dt.getDay()]})`; }
function sortTasks(a){ return a.slice().sort((x,y)=>(x.time||'99:99').localeCompare(y.time||'99:99')||x.createdAt-y.createdAt); }
function tasksOf(ds){ return sortTasks(tasks.filter(t=>t.date===ds)); }

/* ===== 環境判定・期限ヘルパ ===== */
const isiOSdev=/iphone|ipad|ipod/i.test(navigator.userAgent);
const notiSupported=('Notification' in window);
function standaloneNow(){ return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone; }
function dueDiffDays(ds){ return Math.round((new Date(ds)-new Date(todayStr()))/86400000); }
function mdShort(ds){ const a=ds.split('-'); return `${+a[1]}/${+a[2]}`; }

/* ===== 自然言語パース ===== */
function parseNL(text){
  let s=' '+text+' ', date=null, time=null;
  const today=new Date(); today.setHours(0,0,0,0);
  const setD=d=>date=fmt(d);
  for(const [w,n] of [['明後日',2],['あさって',2],['明々後日',3],['明日',1],['あした',1],['今日',0],['本日',0],['きょう',0]]){
    if(s.includes(w)){ const d=new Date(today); d.setDate(d.getDate()+n); setD(d); s=s.replace(w,' '); break; } }
  let m=s.match(/(\d+)日後/); if(m){ const d=new Date(today); d.setDate(d.getDate()+ +m[1]); setD(d); s=s.replace(m[0],' '); }
  if(!date){ m=s.match(/(来週)?(?:今度の)?([日月火水木金土])曜日?/);
    if(m){ const target=WD.indexOf(m[2]); const d=new Date(today); let diff=(target-d.getDay()+7)%7; if(diff===0)diff=m[1]?7:0; if(m[1])diff+=7; d.setDate(d.getDate()+diff); setD(d); s=s.replace(m[0],' '); } }
  if(!date){ m=s.match(/(\d{1,2})月(\d{1,2})日?/)||s.match(/(\d{1,2})\/(\d{1,2})/);
    if(m){ const mo=+m[1],da=+m[2],y=today.getFullYear(); let d=new Date(y,mo-1,da); if(d<today)d=new Date(y+1,mo-1,da); setD(d); s=s.replace(m[0],' '); } }
  if(!date){ m=s.match(/(\d{1,2})日(?!後)/); if(m){ const da=+m[1]; let d=new Date(today.getFullYear(),today.getMonth(),da); if(d<today)d=new Date(today.getFullYear(),today.getMonth()+1,da); setD(d); s=s.replace(m[0],' '); } }
  m=s.match(/(\d{1,2}):(\d{2})/); if(m){ time=String(+m[1]).padStart(2,'0')+':'+m[2]; s=s.replace(m[0],' '); }
  if(!time){ m=s.match(/(午前|午後|朝|昼|夜|夕方)?\s*(\d{1,2})時(半|(\d{1,2})分)?/);
    if(m){ let h=+m[2]; const ap=m[1]; if((ap==='午後'||ap==='夜'||ap==='夕方')&&h<12)h+=12; if(ap==='午前'&&h===12)h=0; let mm=0; if(m[3]==='半')mm=30; else if(m[4])mm=+m[4]; time=String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0'); s=s.replace(m[0],' '); } }
  if(!time){ for(const [w,t] of [['正午','12:00'],['朝','09:00'],['昼','12:00'],['夕方','17:00'],['夜','20:00']]){ if(s.includes(w)){ time=t; s=s.replace(w,' '); break; } } }
  let title=s.replace(/(に|の|で|から|まで|は|を)\s*$/,'').replace(/\s+/g,' ').trim();
  title=title.replace(/^(に|は|を|の)\s*/,'').trim();
  return {date,time,title};
}

/* ===== 描画 ===== */
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function taskHTML(t){
  const cat=CATS[t.cat];
  let dueBadge='';
  if(t.due){ const diff=dueDiffDays(t.due); const cls=diff<0?'overdue':(diff<=3?'soon':'');
    const lbl=diff<0?('期限切れ '+mdShort(t.due)):(diff===0?'本日締切':(mdShort(t.due)+'まで'));
    dueBadge=`<span class="badge due ${cls}">🚩${lbl}</span>`; }
  const badges=[ dueBadge,
    t.notify!=='none'?`<span class="badge notify">🔔${t.notify}分前</span>`:'',
    t.repeat&&t.repeat!=='none'?`<span class="badge rep">🔁${({daily:'毎日',weekly:'毎週',monthly:'毎月'})[t.repeat]}</span>`:'',
    cat?`<span class="cat-dot" style="background:${cat.color}">${cat.label}</span>`:'' ].join('');
  const timeLabel=t.time?`<b>${t.time}</b><small>${t.notify!=='none'?'通知':''}</small>`:`<b>—</b><small>終日</small>`;
  return `<div class="task ${t.done?'is-done':''}" data-id="${t.id}" style="border-left-color:${cat?cat.color:'var(--border)'}">
    <div class="time">${timeLabel}</div>
    <div class="tick ${t.done?'done':''}" data-act="done">${t.done?'✓':''}</div>
    <div class="body" data-act="edit"><div class="ttl">${esc(t.title)}</div>${t.memo?`<div class="memo" data-act="memo">${esc(t.memo)}</div>`:''}<div class="badges">${badges}</div></div>
    <button class="del" data-act="del">✕</button></div>`;
}
function emptyHTML(m){ return `<div class="empty"><div class="ic">🗓️</div>${m}</div>`; }
function renderHome(){
  const ds=todayStr();
  document.getElementById('homeDate').innerHTML=jp(ds).replace(/\(([^)]+)\)/,'<span>($1)</span>');
  const list=tasksOf(ds), remain=list.filter(t=>!t.done).length;
  const ordered=[...list.filter(t=>!t.done),...list.filter(t=>t.done)];
  document.getElementById('homeCount').textContent=list.length?`残り ${remain} 件 / 全 ${list.length} 件`:'';
  document.getElementById('homeTasks').innerHTML=list.length?ordered.map(taskHTML).join(''):emptyHTML('今日のタスクはありません。<br>＋ から追加しましょう。');
}
let calY, calM, selDate=todayStr();
function renderCal(){
  const first=new Date(calY,calM,1), startWd=first.getDay(), days=new Date(calY,calM+1,0).getDate();
  document.getElementById('calTitle').textContent=`${calY}年 ${calM+1}月`;
  let html=['日','月','火','水','木','金','土'].map((w,i)=>`<div class="cal-wd ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('');
  for(let i=0;i<startWd;i++) html+=`<div class="cal-cell blank"></div>`;
  for(let d=1;d<=days;d++){ const ds=fmt(new Date(calY,calM,d)); const dl=tasksOf(ds);
    const dots=dl.slice(0,4).map(t=>`<i style="background:${CATS[t.cat]?CATS[t.cat].color:'#93C5FD'}"></i>`).join('');
    const more=dl.length>4?`<span class="cal-more">+${dl.length-4}</span>`:'';
    html+=`<div class="cal-cell ${ds===todayStr()?'today':''} ${ds===selDate?'sel':''}" data-date="${ds}"><span class="d">${d}</span><div class="cal-dots">${dots}${more}</div></div>`; }
  document.getElementById('calGrid').innerHTML=html;
  document.getElementById('calLegend').innerHTML=Object.values(CATS).map(c=>`<span><i style="background:${c.color}"></i>${c.label}</span>`).join('');
  renderCalDetail();
}
function renderCalDetail(){
  document.getElementById('calDetailDate').innerHTML=jp(selDate).replace(/\(([^)]+)\)/,'<span>($1)</span>')+' のタスク';
  const list=tasksOf(selDate);
  const ordered=[...list.filter(t=>!t.done),...list.filter(t=>t.done)];
  document.getElementById('calDetailCount').textContent=list.length?`${list.length} 件（時間順）`:'';
  document.getElementById('calDetailTasks').innerHTML=list.length?ordered.map(taskHTML).join(''):emptyHTML('この日のタスクはありません。');
}
function renderAll(){ renderHome(); if(typeof calY==='number') renderCal(); }

/* ===== タスク操作 ===== */
function advance(ds,rep){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(y,m-1,d);
  if(rep==='daily')dt.setDate(dt.getDate()+1); else if(rep==='weekly')dt.setDate(dt.getDate()+7); else if(rep==='monthly')dt.setMonth(dt.getMonth()+1); return fmt(dt); }
document.body.addEventListener('click',e=>{
  const el=e.target.closest('.task'); if(!el)return;
  const id=el.dataset.id, act=e.target.closest('[data-act]')?.dataset.act, t=tasks.find(x=>x.id===id); if(!t)return;
  if(act==='done'){ t.done=!t.done; if(t.done){ t.notified=true;
      if(t.repeat&&t.repeat!=='none'){ tasks.push({...t,id:'t'+Date.now()+Math.random().toString(36).slice(2,6),date:advance(t.date,t.repeat),done:false,notified:false,createdAt:Date.now()}); } }
    saveTasks(); renderAll(); }
  else if(act==='del'){ tasks=tasks.filter(x=>x.id!==id); saveTasks(); renderAll(); }
  else if(act==='memo'){ e.target.closest('.memo').classList.toggle('expanded'); return; }
  else if(act==='edit'){ openSheet(t); }
});

/* ===== シート ===== */
const overlay=document.getElementById('overlay'), sheet=document.getElementById('sheet');
let editingId=null, selNotify='none', selCat='', selDue='';
function renderChips(){ document.getElementById('catChips').innerHTML=
  `<button data-c="" class="${selCat===''?'sel':''}" style="${selCat===''?'background:#64748B;':''}">なし</button>`+
  Object.entries(CATS).map(([k,c])=>`<button data-c="${k}" class="${selCat===k?'sel':''}" style="${selCat===k?'background:'+c.color:''}">${c.label}</button>`).join(''); }
function renderDue(){ const btn=document.getElementById('dueToggle'), inp=document.getElementById('fDue');
  if(selDue){ btn.classList.add('on'); btn.textContent='📌 期限あり：'+mdShort(selDue)+'まで（タップで解除）'; inp.style.display='block'; inp.value=selDue; }
  else { btn.classList.remove('on'); btn.textContent='📌 期限を付ける'; inp.style.display='none'; } }
function openSheet(t){
  editingId=t?t.id:null;
  document.getElementById('sheetTitle').textContent=t?'タスクを編集':'タスクを追加';
  document.getElementById('fTitle').value=t?t.title:'';
  document.getElementById('fMemo').value=t?(t.memo||''):'';
  document.getElementById('fDate').value=t?t.date:(currentTab==='cal'?selDate:todayStr());
  document.getElementById('fTime').value=t?(t.time||''):'';
  selNotify=t?t.notify:'none'; selCat=t?(t.cat||''):''; selDue=t?(t.due||''):'';
  document.getElementById('fRepeat').value=t?(t.repeat||'none'):'none';
  [...document.querySelectorAll('#notifyOpts button')].forEach(b=>b.classList.toggle('sel',b.dataset.n===selNotify));
  renderChips(); renderDue(); document.getElementById('nlHint').textContent='';
  overlay.classList.add('show'); sheet.classList.add('show');
  setTimeout(()=>document.getElementById('fTitle').focus(),250);
}
function closeSheet(){ overlay.classList.remove('show'); sheet.classList.remove('show'); editingId=null; }
document.getElementById('fab').onclick=()=>openSheet(null);
document.getElementById('sheetCancel').onclick=closeSheet;
overlay.onclick=closeSheet;
document.getElementById('notifyOpts').onclick=e=>{ const b=e.target.closest('button'); if(!b)return; selNotify=b.dataset.n;
  [...document.querySelectorAll('#notifyOpts button')].forEach(x=>x.classList.toggle('sel',x===b)); };
document.getElementById('catChips').onclick=e=>{ const b=e.target.closest('button'); if(!b)return; selCat=b.dataset.c; renderChips(); };
document.getElementById('dueToggle').onclick=()=>{ selDue = selDue ? '' : (document.getElementById('fDue').value||document.getElementById('fDate').value||todayStr()); renderDue(); };
document.getElementById('fDue').onchange=e=>{ selDue=e.target.value; renderDue(); };
document.getElementById('fTitle').addEventListener('input',e=>{
  const p=parseNL(e.target.value); const h=document.getElementById('nlHint');
  h.textContent=(p.date||p.time)?'📅 認識: '+(p.date?jp(p.date):'日付なし')+(p.time?' '+p.time:'')+(p.title?'｜'+p.title:''):'';
});
document.getElementById('sheetSave').onclick=()=>{
  const raw=document.getElementById('fTitle').value.trim(); if(!raw){ document.getElementById('fTitle').focus(); return; }
  const p=parseNL(raw);
  const title=p.title||raw;
  const memo=document.getElementById('fMemo').value.trim();
  const date=p.date||document.getElementById('fDate').value||todayStr();
  const time=p.time||document.getElementById('fTime').value;
  if(selNotify!=='none'&&!time){ alert('通知を使うには時間を入れてください（例：「15時」と話すか時間欄に入力）。'); return; }
  if(selNotify!=='none') ensureNotifyPermission();
  const repeat=document.getElementById('fRepeat').value;
  const due=selDue||'';
  if(editingId){ Object.assign(tasks.find(x=>x.id===editingId),{title,memo,date,time,notify:selNotify,cat:selCat,repeat,due,notified:false}); }
  else tasks.push({id:'t'+Date.now()+Math.random().toString(36).slice(2,6),title,memo,date,time,notify:selNotify,cat:selCat,repeat,due,done:false,notified:false,createdAt:Date.now()});
  saveTasks(); closeSheet();
  if(currentTab==='cal'){ selDate=date; calY=+date.slice(0,4); calM=+date.slice(5,7)-1; }
  renderAll();
};

/* ===== タブ（ホーム・カレンダーの2つ）===== */
let currentTab='home';
function switchTab(tab){ currentTab=tab;
  document.getElementById('view-home').classList.toggle('hidden',tab!=='home');
  document.getElementById('view-cal').classList.toggle('hidden',tab!=='cal');
  document.getElementById('tab-home').classList.toggle('active',tab==='home');
  document.getElementById('tab-cal').classList.toggle('active',tab==='cal');
  if(tab==='cal'){ if(typeof calY!=='number'){ const d=new Date(); calY=d.getFullYear(); calM=d.getMonth(); } renderCal(); }
  else renderHome();
}
document.getElementById('tab-home').onclick=()=>switchTab('home');
document.getElementById('tab-cal').onclick=()=>switchTab('cal');

/* ===== カレンダー操作 ===== */
document.getElementById('calPrev').onclick=()=>{ calM--; if(calM<0){calM=11;calY--;} renderCal(); };
document.getElementById('calNext').onclick=()=>{ calM++; if(calM>11){calM=0;calY++;} renderCal(); };
document.getElementById('calToday').onclick=()=>{ const d=new Date(); calY=d.getFullYear(); calM=d.getMonth(); selDate=todayStr(); renderCal(); };
document.getElementById('calGrid').onclick=e=>{ const c=e.target.closest('.cal-cell'); if(!c||!c.dataset.date)return; selDate=c.dataset.date; renderCal(); };

/* ===== 音声入力（iOSはキーボード音声入力へ誘導）===== */
const micBtn=document.getElementById('micBtn');
const SR=window.SpeechRecognition||window.webkitSpeechRecognition; let recog=null;
if(SR && !isiOSdev){
  recog=new SR(); recog.lang='ja-JP'; recog.interimResults=false; recog.maxAlternatives=1;
  recog.onresult=e=>{ const txt=e.results[0][0].transcript; const inp=document.getElementById('fTitle');
    inp.value=(inp.value?inp.value+' ':'')+txt; inp.dispatchEvent(new Event('input')); };
  recog.onend=()=>micBtn.classList.remove('recording');
  recog.onerror=ev=>{ micBtn.classList.remove('recording');
    const m={'not-allowed':'マイクの使用が許可されていません。ブラウザ設定でマイクを許可してください。','service-not-allowed':'この端末は音声認識に未対応です。キーボードの🎤をお使いください。','no-speech':'声が聞き取れませんでした。もう一度どうぞ。','audio-capture':'マイクが見つかりません。','network':'ネットワークエラーです。通信状況を確認してください。'}[ev.error];
    if(m) alert(m); }; }
micBtn.onclick=()=>{
  if(!recog){ document.getElementById('fTitle').focus();
    alert(isiOSdev?'iPhoneはアプリ内音声入力が使えません。\n入力欄をタップ →キーボードの🎤（マイク）ボタンで声入力できます。':'この端末は音声入力に未対応です。\nキーボードの🎤（音声入力）をお使いください。'); return; }
  try{ recog.start(); micBtn.classList.add('recording'); }catch(e){ micBtn.classList.remove('recording'); } };

/* ===== 通知（iOSはインストール後に有効化）===== */
const bellBtn=document.getElementById('bellBtn');
const noticeEl=document.getElementById('notice');
function refreshBell(){
  const granted=notiSupported && Notification.permission==='granted';
  bellBtn.classList.toggle('on',granted);
  const span=noticeEl.querySelector('span'), btn=noticeEl.querySelector('button');
  if(granted){ noticeEl.style.display='none'; }
  else if(notiSupported && Notification.permission==='default'){ span.textContent='通知（5・15・30分前）を使うには許可が必要です。'; btn.textContent='通知を許可'; noticeEl.style.display='flex'; }
  else if(!notiSupported && isiOSdev && !standaloneNow()){ span.textContent='iPhoneは「ホーム画面に追加」してアプリで開くと通知が使えます。'; btn.textContent='手順を見る'; noticeEl.style.display='flex'; }
  else { noticeEl.style.display='none'; }
}
function ensureNotifyPermission(){ if(notiSupported && Notification.permission==='default') Notification.requestPermission().then(refreshBell); }
function enableNotify(){
  if(notiSupported){ Notification.requestPermission().then(p=>{ refreshBell();
    if(p==='granted'){ try{ new Notification('Hibi',{body:'通知をオンにしました ✅'}); }catch(e){} }
    else if(p==='denied'){ alert('通知がブロックされています。ブラウザ/端末の設定で、このサイトの通知を許可してください。'); } }); }
  else if(isiOSdev && !standaloneNow()){ alert('iPhoneで通知を使う手順：\n① Safari下の共有ボタン（□に↑）→「ホーム画面に追加」\n② 追加されたHibiアイコンから開く\n③ もう一度🔔を押して「許可」\n（iOS 16.4以降が必要です）'); }
  else { alert('この端末・ブラウザは通知に未対応です。'); }
}
bellBtn.onclick=enableNotify;
document.getElementById('enableNotif').onclick=enableNotify;
function checkNotifications(){ if(!('Notification'in window)||Notification.permission!=='granted')return;
  const now=Date.now(); let ch=false;
  tasks.forEach(t=>{ if(t.done||t.notify==='none'||t.notified||!t.time)return;
    const dt=new Date(`${t.date}T${t.time}`).getTime(), fireAt=dt-parseInt(t.notify,10)*60000;
    if(now>=fireAt&&now<dt+60000){ try{ new Notification('⏰ '+t.title,{body:`${t.time}（${t.notify}分前のお知らせ）`+(t.memo?'\n'+t.memo:''),tag:t.id}); }catch(e){} t.notified=true; ch=true; } });
  if(ch) saveTasks(); }
setInterval(checkNotifications,20000);

/* ===== 初期化 ===== */
function seedIfEmpty(){ if(tasks.length)return; const d=todayStr();
  tasks=[ {id:'demo1',title:'タップで編集・○で完了（例）',memo:'',date:d,time:'09:00',notify:'none',cat:'work1',repeat:'none',done:false,notified:false,createdAt:1},
          {id:'demo2',title:'「明日15時に会議」と話すと自動入力（例）',memo:'内容欄にメモも残せます',date:d,time:'13:30',notify:'15',cat:'life',repeat:'none',done:false,notified:false,createdAt:2} ]; saveTasks(); }
seedIfEmpty(); refreshBell(); renderAll(); checkNotifications();
</script>
<script>
/* PWA: Service Worker 登録 ＋ インストール導線 */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
const installBtn=document.getElementById('installBtn');
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e;
  if(installBtn){ installBtn.style.display='inline-block';
    installBtn.onclick=async()=>{ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display='none'; }; } });
window.addEventListener('appinstalled',()=>{ if(installBtn) installBtn.style.display='none'; });
/* iOS（beforeinstallprompt非対応）向けの手順案内 */
(function(){ const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(isiOS && !standalone && installBtn){ installBtn.style.display='inline-block';
    installBtn.onclick=()=>alert('iPhoneでホーム画面に追加：\n画面下の共有ボタン（□に↑）をタップ →「ホーム画面に追加」を選んでください。'); } })();
</script>
