<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>邸宅へ入っていく演出（フライスルー）｜ CHIKAI 制作サンプル</title>
<meta name="description" content="CHIKAIの制作サンプル。スクロールで外観→玄関→室内→眺望へ、入口から入っていくように進む不動産向け没入演出のデモ。写真を入れ替えれば実写でリアルに。">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#0A1722;color:#F3EEE2;font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
:root{--gold:#C8A45D}

.chikai-bar{position:fixed;top:0;left:0;right:0;z-index:400;background:linear-gradient(135deg,#2563EB,#3B82F6,#06B6D4);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:7px 14px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.chikai-bar a{color:#fff;text-decoration:underline}.chikai-bar .tag{background:rgba(255,255,255,.22);padding:2px 9px;border-radius:100px;font-size:10.5px}

.scroller{position:relative;height:620vh}
.stage{position:sticky;top:0;height:100vh;overflow:hidden;background:#0A1722}
.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;will-change:transform,opacity;backface-visibility:hidden}
.bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.bg .ph{position:absolute;bottom:16%;left:0;right:0;text-align:center;font-size:13px;letter-spacing:2px;color:rgba(243,238,226,.45)}
.bg .ico{font-size:90px;opacity:.5}
.scene::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 40%,rgba(8,18,28,.65) 100%)}
.s0 .bg{background:linear-gradient(rgba(8,18,28,.34),rgba(8,18,28,.5)),url(re/1.jpg) center/cover no-repeat,#1B3A52}
.s1 .bg{background:linear-gradient(rgba(8,18,28,.38),rgba(8,18,28,.52)),url(re/2.jpg) center/cover no-repeat,#10202e}
.s2 .bg{background:linear-gradient(rgba(8,18,28,.4),rgba(8,18,28,.54)),url(re/3.jpg) center/cover no-repeat,#16323f}
.s3 .bg{background:linear-gradient(rgba(8,18,28,.42),rgba(8,18,28,.55)),url(re/4.jpg) center/cover no-repeat,#1B3A52}
.s4 .bg{background:linear-gradient(rgba(8,18,28,.36),rgba(8,18,28,.5)),url(re/5.jpg) center/cover no-repeat,#1B3A52}
.s5 .bg{background:linear-gradient(rgba(8,18,28,.6),rgba(8,18,28,.72)),url(re/5.jpg) center/cover no-repeat,#0A1722}

.cap{position:relative;z-index:3;text-align:center;padding:0 24px;max-width:880px}
.cap .eye{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(16px,2.4vw,22px);letter-spacing:2px;color:var(--gold);margin-bottom:14px}
.cap h2{font-size:clamp(32px,6vw,64px);font-weight:900;line-height:1.4;letter-spacing:.05em;text-shadow:0 8px 40px rgba(0,0,0,.6)}
.cap p{margin-top:16px;font-size:clamp(14px,2vw,18px);color:rgba(243,238,226,.82)}
.cap .hint{margin-top:24px;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--gold);animation:bob 1.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
.cap .slot{display:inline-block;margin-top:18px;font-size:11px;letter-spacing:1px;color:rgba(200,164,93,.8);border:1px dashed rgba(200,164,93,.4);border-radius:4px;padding:5px 12px}
.btn-gold{display:inline-block;margin-top:22px;background:var(--gold);color:#2A2113;padding:15px 40px;border-radius:4px;font-weight:800;text-decoration:none;transition:transform .2s}
.btn-gold:hover{transform:translateY(-3px)}

.hud{position:fixed;left:0;right:0;top:30px;height:3px;background:rgba(255,255,255,.08);z-index:350}
.hud i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),#E6CE96)}
.step-label{position:fixed;left:20px;bottom:20px;z-index:350;font-family:'Cormorant Garamond';font-style:italic;font-size:15px;color:var(--gold);letter-spacing:1px}
.back-cta{position:fixed;right:18px;bottom:18px;z-index:360;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);color:#fff;padding:11px 18px;border-radius:100px;text-decoration:none;font-size:12.5px;font-weight:700}
</style>
</head>
<body>
<div class="chikai-bar"><span class="tag">SAMPLE</span><span>CHIKAI 制作サンプル｜<strong>実写で外観→玄関→廊下→リビング→眺望へ入っていく没入演出</strong>。スクロール👇</span><a href="index.html">→ 一覧へ</a></div>
<div class="hud"><i id="bar"></i></div>

<div class="scroller" id="scroller">
  <div class="stage">

    <div class="scene s0" data-i="0" data-step="Exterior">
      <div class="bg"></div>
      <div class="cap"><p class="eye">GRAND VIEW</p><h2>ようこそ、<br>この邸宅へ。</h2><p class="hint">スクロールで中へ ↓</p></div>
    </div>

    <div class="scene s1" data-i="1" data-step="Entrance">
      <div class="bg"></div>
      <div class="cap"><p class="eye">Entrance</p><h2>玄関を、抜けて。</h2></div>
    </div>

    <div class="scene s2" data-i="2" data-step="Hall">
      <div class="bg"></div>
      <div class="cap"><p class="eye">Hall</p><h2>光が、出迎える。</h2></div>
    </div>

    <div class="scene s3" data-i="3" data-step="Living">
      <div class="bg"></div>
      <div class="cap"><p class="eye">Living</p><h2>暮らしの、中心へ。</h2></div>
    </div>

    <div class="scene s4" data-i="4" data-step="View">
      <div class="bg"></div>
      <div class="cap"><p class="eye">View</p><h2>そして、<br>この眺望。</h2></div>
    </div>

    <div class="scene s5" data-i="5" data-step="Contact">
      <div class="bg"></div>
      <div class="cap"><p class="eye">Contact</p><h2>この住まいを、<br>見にいく。</h2><a href="../index.html#contact" class="btn-gold">内見を予約する →</a></div>
    </div>

  </div>
</div>

<div class="step-label" id="stepLabel">Exterior</div>
<a href="index.html" class="back-cta">🎨 サンプル一覧へ</a>

<script>
const scroller=document.getElementById('scroller');
const scenes=[...document.querySelectorAll('.scene')];
const bar=document.getElementById('bar');
const stepLabel=document.getElementById('stepLabel');
const N=scenes.length;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function render(){
  const max=scroller.offsetHeight-innerHeight;
  const prog=max>0?clamp(scrollY/max,0,1):0;
  const f=prog*(N-1);              // 0 → N-1（前へ進む"カメラ"）
  scenes.forEach((s,i)=>{
    const d=i-f;                   // +：まだ奥（小さく遠く）／−：通り過ぎた（拡大して消える）
    const scale=clamp(1 - d*0.5, 0.45, 2.4);
    const op = d>=0 ? clamp(1.15-d,0,1) : clamp(1+d*1.7,0,1);
    s.style.transform=`scale(${scale.toFixed(3)})`;
    s.style.opacity=op.toFixed(3);
    s.style.zIndex=Math.round(100-Math.abs(d)*10);
    s.style.pointerEvents=Math.abs(d)<0.5?'auto':'none';
  });
  bar.style.width=(prog*100)+'%';
  const cur=scenes[clamp(Math.round(f),0,N-1)];
  stepLabel.textContent=cur.dataset.step;
}
let tick=false;
addEventListener('scroll',()=>{if(!tick){requestAnimationFrame(()=>{render();tick=false});tick=true}},{passive:true});
addEventListener('resize',render,{passive:true});
render();
</script>
</body>
</html>
