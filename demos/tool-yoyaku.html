<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>サロン予約ボード ｜ 予約・顧客管理ツール（CHIKAI 制作サンプル）</title>
<meta name="description" content="CHIKAIの制作サンプル。美容室・サロン向けの予約／顧客管理ダッシュボードのデモ。誕生日アラート・来店ステータス管理など、実際に動く業務ツールの見本です。">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#EC4899;--rose-d:#DB2777;--bg:#FBF5F8;--card:#fff;--ink:#1F1422;--ink2:#7A6B73;--line:#F0E1E9;
  --ok:#16A34A;--ok-bg:#DCFCE7;--amber:#D97706;--amber-bg:#FEF3C7;--gray:#94A3B8;--gray-bg:#F1F5F9;
  --shadow:0 14px 40px rgba(236,72,153,.12);--shadow-sm:0 3px 14px rgba(31,20,34,.06)}
body{background:var(--bg);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.7}
.chikai-bar{background:linear-gradient(135deg,#7C3AED,#3B82F6,#06B6D4);color:#fff;font-size:12.5px;font-weight:700;text-align:center;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.chikai-bar a{color:#fff;text-decoration:underline}.chikai-bar .tag{background:rgba(255,255,255,.22);padding:2px 10px;border-radius:100px;font-size:11px}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px clamp(16px,4vw,32px);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.app-brand{display:flex;align-items:center;gap:12px}
.app-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#F472B6,#EC4899);display:flex;align-items:center;justify-content:center;font-size:21px}
.app-name{font-weight:800;font-size:18px}.app-name small{display:block;font-family:'Outfit';font-size:10px;font-weight:500;letter-spacing:2px;color:var(--ink2)}
.app-date{font-family:'Outfit';font-size:13px;color:var(--ink2);font-weight:600}
.wrap{max-width:1140px;margin:0 auto;padding:clamp(20px,4vw,30px) clamp(16px,4vw,32px) 70px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-sm)}
.kpi .l{font-size:12.5px;color:var(--ink2);font-weight:600;margin-bottom:6px}
.kpi .n{font-family:'Outfit';font-size:30px;font-weight:800;line-height:1}.kpi .n small{font-size:14px;color:var(--ink2)}
.kpi.pink .n{color:var(--rose)}
@media(max-width:720px){.kpis{grid-template-columns:1fr 1fr}}
.cols{display:grid;grid-template-columns:1.2fr 1fr;gap:22px}
@media(max-width:900px){.cols{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-sm);overflow:hidden}
.card-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.card-h h2{font-size:16px;font-weight:800}
.card-h .sub{font-size:12px;color:var(--ink2)}
.resv{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line)}
.resv:last-child{border-bottom:none}
.resv .time{font-family:'Outfit';font-weight:700;font-size:16px;width:54px;flex-shrink:0}
.resv .info{flex:1;min-width:0}
.resv .nm{font-weight:700;font-size:14.5px}
.resv .mn{font-size:12.5px;color:var(--ink2)}
.resv .price{font-family:'Outfit';font-weight:700;font-size:14px;color:var(--ink2);white-space:nowrap}
.st-btn{border:none;border-radius:100px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:transform .12s}
.st-btn:active{transform:scale(.94)}
.st-wait{background:var(--gray-bg);color:var(--gray)}
.st-now{background:var(--amber-bg);color:var(--amber)}
.st-done{background:var(--ok-bg);color:var(--ok)}
.search{padding:14px 18px;border-bottom:1px solid var(--line)}
.search input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 14px 10px 36px;font-size:14px;font-family:inherit;background:#fff;background-image:none}
.search{position:relative}.search::before{content:'🔍';position:absolute;left:30px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1}
.cust{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid var(--line)}
.cust:last-child{border-bottom:none}
.cust .av{width:38px;height:38px;border-radius:50%;background:#FCE7F3;color:var(--rose-d);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.cust .nm{font-weight:700;font-size:14px}
.cust .meta{font-size:12px;color:var(--ink2)}
.cust .badges{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tier{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.t-vip{background:#FEF3C7;color:#B45309}.t-reg{background:#E0E7FF;color:#4338CA}.t-new{background:#DCFCE7;color:#15803D}
.bday{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:#FCE7F3;color:var(--rose-d)}
.warn-last{color:var(--amber);font-weight:700}
.foot-note{margin-top:28px;text-align:center;font-size:13px;color:var(--ink2)}.foot-note a{color:var(--rose-d);font-weight:700;text-decoration:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--rose-d);color:#fff;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:var(--shadow);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.back-cta{position:fixed;right:18px;bottom:18px;z-index:40;background:linear-gradient(135deg,#7C3AED,#06B6D4);color:#fff;padding:13px 20px;border-radius:100px;text-decoration:none;font-size:13px;font-weight:700;box-shadow:0 12px 30px rgba(124,58,237,.4)}
</style>
</head>
<body>
<div class="chikai-bar"><span class="tag">SAMPLE</span><span>これは <strong>CHIKAI の制作サンプル</strong>（架空データで動く予約管理ツールのデモ）。予約のステータスを押すと進みます。</span><a href="index.html">→ 一覧へ</a></div>
<div class="topbar">
  <div class="app-brand"><div class="app-logo">💇</div><div class="app-name">サロン予約ボード<small>SALON RESERVATION</small></div></div>
  <div class="app-date" id="today">2026年5月29日（金）</div>
</div>
<div class="wrap">
  <div class="kpis">
    <div class="kpi pink"><div class="l">📅 本日の予約</div><div class="n"><span id="kResv">5</span><small> 件</small></div></div>
    <div class="kpi"><div class="l">💰 本日の予定売上</div><div class="n" id="kSales">¥0</div></div>
    <div class="kpi"><div class="l">✨ 今月の新規</div><div class="n">12<small> 名</small></div></div>
    <div class="kpi"><div class="l">🔁 リピート率</div><div class="n">68<small>%</small></div></div>
  </div>
  <div class="cols">
    <div class="card">
      <div class="card-h"><h2>本日の予約</h2><span class="sub">タップでステータス変更</span></div>
      <div id="resvList"></div>
    </div>
    <div class="card">
      <div class="card-h"><h2>顧客一覧</h2><span class="sub">🎂＝今月誕生日</span></div>
      <div class="search"><input id="custSearch" type="text" placeholder="お客様名で検索"></div>
      <div id="custList"></div>
    </div>
  </div>
  <p class="foot-note">🎨 このツールは <strong>CHIKAI</strong> の制作サンプルです（架空データ）。御社の予約・顧客管理ツールも作れます → <a href="../index.html#contact">LINEで相談する</a></p>
</div>
<div class="toast" id="toast"></div>
<a href="index.html" class="back-cta">🎨 サンプル一覧へ</a>
<script>
const $=id=>document.getElementById(id);
const yen=n=>'¥'+Math.round(n).toLocaleString('ja-JP');
const STATES=['wait','now','done'], STLABEL={wait:'受付前',now:'来店中',done:'会計済'};
let resv=[
  {time:'10:00',name:'田中 美咲',menu:'カット＋カラー',price:11000,st:'done'},
  {time:'11:30',name:'鈴木 花子',menu:'髪質改善トリートメント',price:8800,st:'now'},
  {time:'13:00',name:'高橋 結衣',menu:'カット',price:5500,st:'wait'},
  {time:'14:30',name:'伊藤 さくら',menu:'ヘッドスパ＋カット',price:9900,st:'wait'},
  {time:'16:00',name:'渡辺 七海',menu:'カット＋パーマ',price:12500,st:'wait'}
];
const custs=[
  {name:'田中 美咲',tier:'reg',last:'3週間前',bday:true},
  {name:'鈴木 花子',tier:'vip',last:'2週間前',bday:false},
  {name:'高橋 結衣',tier:'new',last:'初回ご来店',bday:false},
  {name:'伊藤 さくら',tier:'reg',last:'1ヶ月前',bday:true},
  {name:'渡辺 七海',tier:'reg',last:'5週間前',bday:false,alert:true},
  {name:'小林 楓',tier:'vip',last:'10日前',bday:false}
];
const TIER={vip:['t-vip','VIP'],reg:['t-reg','常連'],new:['t-new','新規']};
function renderResv(){
  $('resvList').innerHTML=resv.map((r,i)=>`<div class="resv">
    <div class="time">${r.time}</div>
    <div class="info"><div class="nm">${r.name}</div><div class="mn">${r.menu}</div></div>
    <div class="price">${yen(r.price)}</div>
    <button class="st-btn st-${r.st}" data-i="${i}">${STLABEL[r.st]}</button></div>`).join('');
  $('kResv').textContent=resv.length;
  $('kSales').textContent=yen(resv.reduce((s,r)=>s+r.price,0));
}
function renderCust(q=''){
  const list=custs.filter(c=>!q||c.name.includes(q));
  $('custList').innerHTML=list.length?list.map(c=>{
    const[cls,lbl]=TIER[c.tier];
    return `<div class="cust"><div class="av">${c.name[0]}</div>
      <div><div class="nm">${c.name}</div><div class="meta">最終来店：<span class="${c.alert?'warn-last':''}">${c.last}${c.alert?' ⚠ 再来店促進':''}</span></div></div>
      <div class="badges">${c.bday?'<span class="bday">🎂 今月</span>':''}<span class="tier ${cls}">${lbl}</span></div></div>`;
  }).join(''):'<div style="padding:30px;text-align:center;color:var(--ink2);font-size:14px">該当なし</div>';
}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2600);}
$('resvList').addEventListener('click',e=>{const b=e.target.closest('.st-btn');if(!b)return;const i=+b.dataset.i;
  const cur=STATES.indexOf(resv[i].st);resv[i].st=STATES[(cur+1)%3];renderResv();
  if(resv[i].st==='done')toast(`${resv[i].name} 様 会計完了 💳`);});
$('custSearch').addEventListener('input',e=>renderCust(e.target.value));
renderResv();renderCust();
const bdays=custs.filter(c=>c.bday).length;
setTimeout(()=>{if(bdays)toast(`今月お誕生日のお客様が ${bdays}名 います🎂 クーポン配信のチャンス！`);},700);
</script>
</body>
</html>
